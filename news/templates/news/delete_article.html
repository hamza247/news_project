{% extends "news/base.html" %}

{% block content %}

<h2>Delete Article</h2>

<p>Are you sure you want to delete this article?</p>

<h3>{{ article.title }}</h3>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn">Yes, Delete</button>
</form>

<a class="btn" href="{% url 'dashboard' %}">
    Cancel
</a>

{% endblock %}
