{% extends "news/base.html" %}

{% block title %}Register · NewsHub{% endblock %}

{% block content %}
<div class="card auth-card">
    <h1>Create your account</h1>
    <p class="subtitle">Pick the role that matches what you'll do on NewsHub.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">Register</button>
    </form>

    <p class="form-footer">
        Already have an account? <a href="{% url 'login' %}">Log in</a>.
    </p>
</div>
{% endblock %}
